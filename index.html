<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>점프 장애물 피하기 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="game-wrap">
        <h1>점프 장애물 피하기</h1>

        <section class="info-box">
            <p><strong>조작:</strong> Space 키로 점프</p>
            <p><strong>목표:</strong> 30초 동안 장애물을 피하면 승리</p>
            <p><strong>기록:</strong> 게임 종료 후 닉네임 저장</p>
        </section>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="status-box">
            <p id="timerText">남은 시간: 30초</p>
            <p id="messageText">Space 키를 눌러 게임 시작</p>
        </div>

        <div class="button-box">
            <button id="restartButton">다시 시작</button>
            <button id="soundButton">효과음 ON</button>
        </div>

        <section id="nicknameBox" class="nickname-box hidden">
            <h2>플레이 기록 남기기</h2>
            <p id="resultSummaryText">게임 결과</p>

            <div class="nickname-input-row">
                <input 
                    type="text" 
                    id="nicknameInput" 
                    maxlength="10" 
                    placeholder="닉네임 입력"
                >
                <button id="saveLogButton">기록 저장</button>
            </div>

            <p id="nicknameErrorText"></p>
        </section>

        <section class="ranking-panel">
            <div class="ranking-header">
                <h2>플레이 랭킹 TOP 10</h2>
                <button id="clearRankingButton">기록 초기화</button>
            </div>

            <ol id="rankingList"></ol>
            <p id="emptyRankingText">아직 저장된 기록이 없습니다.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
